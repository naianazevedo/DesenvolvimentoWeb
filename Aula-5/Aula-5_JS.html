<!DOCTYPE html>

<body>
  <script>
    let pecaPreco = 10;
    let pecas = Number(prompt("Qual a quantidade de peças encomendadas?"));

    if (pecas > 0) {
      let total = pecaPreco * pecas;
      console.log("O valor total da encomenda é: R$" + total);
    }
  </script>
